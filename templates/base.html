<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Network Monitor{% endblock %}</title>
  {% load static %}
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #0d1117; }
    .status-up   { color: #3fb950; }
    .status-down { color: #f85149; }
    .status-unknown { color: #8b949e; }
    .badge-up   { background-color: #3fb950; }
    .badge-down { background-color: #f85149; }
    .card { border-color: #30363d; background-color: #161b22; }
    .table { --bs-table-bg: #161b22; --bs-table-border-color: #30363d; }
    .navbar { border-bottom: 1px solid #30363d; }
    .weather-icon { width: 48px; height: 48px; }
    .ha-widget { min-width: 140px; }
    .service-table td { white-space: nowrap; vertical-align: middle; }
    .service-table .cell-detail { max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
        <i class="bi bi-hdd-network me-2"></i>Network Monitor
      </a>
      <div class="navbar-nav ms-auto flex-row gap-3 align-items-center">
        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
          <i class="bi bi-grid-3x3-gap me-1"></i>Dashboard
        </a>
        <a class="nav-link {% if request.resolver_match.url_name == 'monitor' %}active{% endif %}" href="{% url 'monitor' %}">
          <i class="bi bi-funnel me-1"></i>Monitor
        </a>
        <span class="text-muted small">{{ request.user.get_full_name|default:request.user.username }}</span>
        <a class="nav-link text-muted small" href="{% url 'logout' %}">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
